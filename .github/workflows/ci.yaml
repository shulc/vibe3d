# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.
name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build:

    # Self-hosted Ubuntu runner. DMD + dub are pre-installed on the host
    # (system dmd via dpkg), so we skip dlang-community/setup-dlang and call
    # `dmd` directly instead of the $DC it would otherwise export.
    runs-on: [self-hosted, Linux]

    steps:
    - uses: actions/checkout@v4

    - name: 'First-pass build (fetches nfde and clones NFD repo, expected to fail)'
      run: dub build --compiler=dmd || true

    - name: 'Initialize nativefiledialog-extended submodules'
      run: |
        NFD_DIR="$HOME/.dub/packages/nfde/0.1.3/nfde/nativefiledialog-extended"
        if [ -d "$NFD_DIR" ]; then
          cd "$NFD_DIR"
          git submodule update --init --recursive
        fi

    - name: 'Build'
      run: dub build --compiler=dmd

    - name: 'Unit tests (embedded unittest blocks)'
      # nfde's static ctor calls NFD_Init() (GTK), which needs a display;
      # xvfb-run gives the headless runner a virtual one.
      run: xvfb-run -a dub test --compiler=dmd

    - name: 'Integration tests (HTTP suite via run_all.d)'
      # run_all.d --only unit fans out to ./run_test.d -j 4 with the documented
      # flaky tests excluded (test_selection, test_toolpipe_axis). --no-build
      # reuses the ./vibe3d binary from the Build step. The whole thing runs
      # under one Xvfb display so each spawned `vibe3d --test` gets a GL context.
      run: xvfb-run -a ./run_all.d --only unit --no-build -j 4
