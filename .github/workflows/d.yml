# separate terms of service, privacy policy, and support
# documentation.
name: D

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - uses: dlang-community/setup-dlang@4c99aa991ce7d19dd3064de0a4f2f6b2f152e2d7

    - name: 'Install system dependencies'
      run: sudo apt-get update && sudo apt-get install -y libsdl2-dev libgtk-3-dev ninja-build xvfb

    - name: 'First-pass build (fetches nfde and clones NFD repo, expected to fail)'
      run: dub build --compiler=$DC || true

    - name: 'Initialize nativefiledialog-extended submodules'
      run: |
        NFD_DIR="$HOME/.dub/packages/nfde/0.1.3/nfde/nativefiledialog-extended"
        if [ -d "$NFD_DIR" ]; then
          cd "$NFD_DIR"
          git submodule update --init --recursive
        fi

    - name: 'Build & Test'
      run: |
        dub build --compiler=$DC
        # nfde's static ctor calls NFD_Init() (GTK), which needs a display.
        # xvfb-run gives the headless runner a virtual one.
        xvfb-run -a dub test --compiler=$DC
