name: Build

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.0.0)'
        required: true
        default: 'v0.0.1'
      with_render:
        description: 'Also build the with-render variant (slow: pulls Blender LFS, builds Cycles, bundles RPR/Cycles libs)'
        type: boolean
        default: false
      nightly:
        description: 'Publish as the rolling "nightly" pre-release (delete + recreate the nightly tag with these assets, ignoring the 24h commit-age gate)'
        type: boolean
        default: false
  # Nightly build: publishes a single rolling "nightly" pre-release (modeling
  # only — with-render is disabled for the regular build for now) and skips when
  # there were no commits in the last 24h. The runner must be online at this
  # time — adjust the cron if needed (UTC).
  schedule:
    - cron: '0 3 * * *'

permissions:
  contents: write

jobs:
  # Resolve what this run should do. For a scheduled run it becomes a nightly
  # (tag=nightly, modeling-only, prerelease) and is skipped when main saw no
  # commits in the last 24h. A manual dispatch keeps its tag / with_render inputs
  # (so with-render can still be exercised on demand).
  check:
    runs-on: [self-hosted, Linux]
    outputs:
      should_run:  ${{ steps.decide.outputs.should_run }}
      tag:         ${{ steps.decide.outputs.tag }}
      with_render: ${{ steps.decide.outputs.with_render }}
      nightly:     ${{ steps.decide.outputs.nightly }}
    steps:
      - uses: actions/checkout@v4
      - id: decide
        env:
          EVENT:      ${{ github.event_name }}
          IN_TAG:     ${{ inputs.tag }}
          IN_RENDER:  ${{ inputs.with_render }}
          IN_NIGHTLY: ${{ inputs.nightly }}
        run: |
          if [ "$EVENT" = "schedule" ]; then
            # with_render disabled for the regular nightly for now (render
            # backends still need toolchain work on the runners); modeling only.
            tag=nightly; with_render=false; nightly=true
            age=$(( $(date +%s) - $(git log -1 --format=%ct) ))
            if [ "$age" -lt 86400 ]; then
              should_run=true
            else
              should_run=false
              echo "No commits in the last 24h — skipping nightly."
            fi
          elif [ "$IN_NIGHTLY" = "true" ]; then
            # Manual nightly: same rolling-prerelease path as the cron (release
            # job deletes + recreates the nightly tag), but always runs (no 24h
            # commit-age gate) and honors the with_render input.
            tag=nightly; with_render="$IN_RENDER"; nightly=true; should_run=true
          else
            tag="$IN_TAG"; with_render="$IN_RENDER"; nightly=false; should_run=true
          fi
          {
            echo "should_run=$should_run"
            echo "tag=$tag"
            echo "with_render=$with_render"
            echo "nightly=$nightly"
          } >> "$GITHUB_OUTPUT"

  build:
    needs: check
    if: ${{ needs.check.outputs.should_run == 'true' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: [self-hosted, Linux]
            name: linux
            binary: vibe3d
          - runner: [self-hosted, macOS, ARM64]
            name: macos-arm64
            binary: vibe3d
          - runner: [self-hosted, macOS, X64]
            name: macos-x64
            binary: vibe3d
          - runner: [self-hosted, Windows]
            name: windows
            binary: vibe3d.exe

    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v4

      - name: Add Homebrew to PATH (macOS)
        if: runner.os == 'macOS'
        run: |
          if [ -x /opt/homebrew/bin/brew ]; then
            echo "/opt/homebrew/bin" >> "$GITHUB_PATH"
            echo "/opt/homebrew/sbin" >> "$GITHUB_PATH"
            export PATH="/opt/homebrew/bin:/opt/homebrew/sbin:$PATH"
          elif [ -x /usr/local/bin/brew ]; then
            echo "/usr/local/bin" >> "$GITHUB_PATH"
            echo "/usr/local/sbin" >> "$GITHUB_PATH"
            export PATH="/usr/local/bin:/usr/local/sbin:$PATH"
          else
            echo "::error::Homebrew not found on this macOS runner. Install Homebrew and re-run."
            exit 1
          fi
          brew --version | head -1

      - name: Set deployment target (macOS)
        if: runner.os == 'macOS'
        run: echo "MACOSX_DEPLOYMENT_TARGET=11.0" >> "$GITHUB_ENV"

      - name: Install build dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          missing=()
          for pkg in sdl2 cmake ninja; do
            if ! brew list "$pkg" >/dev/null 2>&1; then
              missing+=("$pkg")
            fi
          done
          if [ "${#missing[@]}" -gt 0 ]; then
            brew install "${missing[@]}"
          fi

      # Windows C: is small; put the dub package cache (nfde + heavy render git
      # deps / LFS) on F: where there's room. Must precede any dub command.
      - name: Put dub cache on F drive (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path F:\dub | Out-Null
          Add-Content -Path $env:GITHUB_ENV -Value "DUB_HOME=F:\dub"

      # Release is built with LDC (optimized). LDC must be pre-installed on the
      # runner host — these steps only LOCATE it (PATH or common dlang install
      # dirs) and fail with a clear message if absent; they never download it.
      - name: Locate LDC (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          if ! command -v ldc2 >/dev/null 2>&1; then
            for d in "$HOME"/dlang/ldc*/bin "$HOME"/.local/dlang/ldc*/bin \
                     /opt/ldc*/bin /usr/lib/ldc*/bin /usr/local/ldc*/bin; do
              if [ -x "$d/ldc2" ]; then echo "$d" >> "$GITHUB_PATH"; export PATH="$d:$PATH"; break; fi
            done
          fi
          command -v ldc2 >/dev/null 2>&1 || {
            echo "::error::ldc2 not found on this runner. Install LDC (e.g. ~/dlang/ldc-<ver>) so ldc2 is on PATH."
            exit 1; }
          ldc2 --version | head -1 || true

      - name: Locate dub (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          if ! command -v dub >/dev/null 2>&1; then
            for d in "$HOME"/Code/dub/bin "$HOME"/dub/bin "$HOME"/.local/bin \
                     /opt/dub/bin /usr/local/bin; do
              if [ -x "$d/dub" ]; then echo "$d" >> "$GITHUB_PATH"; export PATH="$d:$PATH"; break; fi
            done
          fi
          command -v dub >/dev/null 2>&1 || {
            echo "::error::dub not found on this runner. Install dub or put it under ~/Code/dub/bin."
            exit 1; }
          dub --version

      - name: Locate LDC (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          if (-not (Get-Command ldc2 -ErrorAction SilentlyContinue)) {
            # Enumerate ldc* dirs under each base and check for bin\ldc2.exe —
            # more reliable than a wildcard-in-path + -Filter query.
            foreach ($base in @("$env:USERPROFILE\dlang", "C:\", "C:\Program Files", "C:\tools")) {
              if (-not (Test-Path $base)) { continue }
              $d = Get-ChildItem -Path $base -Directory -Filter "ldc*" -ErrorAction SilentlyContinue |
                   Where-Object { Test-Path (Join-Path $_.FullName "bin\ldc2.exe") } | Select-Object -First 1
              if ($d) {
                $bin = Join-Path $d.FullName "bin"
                Add-Content $env:GITHUB_PATH $bin
                $env:PATH = "$bin;$env:PATH"
                break
              }
            }
          }
          if (-not (Get-Command ldc2 -ErrorAction SilentlyContinue)) {
            Write-Output "::error::ldc2 not found on this runner. Install LDC so ldc2.exe is on PATH."
            exit 1
          }
          # Print the banner WITHOUT a pipe — `| Select-Object -First 1` stops
          # the pipeline early, kills ldc2.exe, and sets a non-zero exit code.
          ldc2 --version

      # ---- SDL2 ----
      # Linux self-hosted runner has SDL2/GTK3/ninja pre-installed on the host.

      - name: Install SDL2 (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          $sdlVer = "2.30.3"
          # Reuse a cached C:\SDL2 across runs; only download+extract if absent.
          $sdlDir = Get-ChildItem C:\SDL2 -Directory -ErrorAction SilentlyContinue |
                    Where-Object { Test-Path "$($_.FullName)\lib\x64\SDL2.dll" } | Select-Object -First 1
          if (-not $sdlDir) {
            $url = "https://github.com/libsdl-org/SDL/releases/download/release-$sdlVer/SDL2-devel-$sdlVer-VC.zip"
            Invoke-WebRequest $url -OutFile SDL2-devel.zip
            if (Test-Path C:\SDL2) { Remove-Item C:\SDL2 -Recurse -Force }
            Expand-Archive SDL2-devel.zip -DestinationPath C:\SDL2 -Force
            $sdlDir = Get-ChildItem C:\SDL2 -Directory |
                      Where-Object { Test-Path "$($_.FullName)\lib\x64\SDL2.dll" } | Select-Object -First 1
          } else {
            Write-Host "Reusing cached SDL2 at $($sdlDir.FullName)"
          }
          # Per-run: export SDL2_DIR, stage SDL2.dll for the zip, add libs to PATH.
          echo "SDL2_DIR=$($sdlDir.FullName)" >> $env:GITHUB_ENV
          Copy-Item "$($sdlDir.FullName)\lib\x64\SDL2.dll" -Destination .
          echo "$($sdlDir.FullName)\lib\x64" >> $env:GITHUB_PATH

      # ---- nfde: Windows needs MSVC (not MinGW) to produce nfd.lib ----

      - name: Remove MinGW / Strawberry Perl / LLVM from PATH (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          $filtered = ($env:PATH -split ';' | Where-Object { $_ -notmatch 'mingw|Strawberry|LLVM' }) -join ';'
          # Add-Content (not Out-File -Encoding utf8) avoids the UTF-8 BOM that
          # Windows PowerShell 5.1 would otherwise prepend into $GITHUB_ENV.
          Add-Content -Path $env:GITHUB_ENV -Value "PATH=$filtered"

      - name: Define NDEBUG for nfde C/C++ build (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          echo "CFLAGS=-DNDEBUG" >> $env:GITHUB_ENV
          echo "CXXFLAGS=-DNDEBUG" >> $env:GITHUB_ENV

      - name: Activate MSVC dev environment (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Add Git Bash to PATH (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          $gitBin = Join-Path $env:ProgramFiles "Git\bin"
          if (-not (Test-Path (Join-Path $gitBin "bash.exe"))) {
            Write-Output "::error::Git Bash not found at $gitBin"
            exit 1
          }
          Add-Content $env:GITHUB_PATH $gitBin
          $env:PATH = "$gitBin;$env:PATH"

      # Git dependencies are pinned to commit SHAs in dub.json/dub.selections.json.
      # Keep the persistent dub cache intact so heavyweight deps (notably assimp
      # via lwo2-writer/bindbc-assimp6) are not re-cloned on every CI run.

      # ---- Build ----

      - name: Build
        run: dub build --compiler=ldc2 --build=release --d-version=ReleaseBuild

      - name: Build app bundle (macOS)
        if: runner.os == 'macOS'
        run: tools/macos/build_app.sh --no-build --output Vibe3D.app

      # ---- Zip ----

      # Linux: a self-contained, broad-glibc (>= 2.30) AppImage built + launch-
      # verified INSIDE an Ubuntu-20.04 container (podman rootless), which floors
      # the glibc far below the runner's own. Replaces vibe3d-linux.zip (which
      # needed a system SDL2 + GTK3 and floored at the runner's glibc). The
      # container does its own `dub build`, so the matrix Build step above is
      # redundant on Linux (kept for simplicity; a later optimization can skip it).
      # Requires podman/docker on the self-hosted Linux runner (+ network for the
      # first image build). Ships the opt-in AI worker under usr/bin/tools/.
      - name: Build self-contained AppImage (Linux)
        if: runner.os == 'Linux'
        run: tools/release/build_linux_appimage_container.sh --verify

      - name: Zip artifact (macOS)
        if: runner.os == 'macOS'
        run: ditto -c -k --sequesterRsrc --keepParent Vibe3D.app vibe3d-${{ matrix.name }}.zip

      - name: Zip artifact (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          # ONNX Runtime is linked dynamically via the import library fetched by
          # d-onnxruntime's CMake configure step. Stage the DLL next to the exe
          # so the plain modeling release zip is runnable without PATH setup.
          $describe = $null
          & {
            $ErrorActionPreference = 'Continue'
            $script:describe = (dub describe 2>$null | Where-Object {
              $_ -match '^[\{\}\[\]\"\s\d]' -or $_ -match '^\s+'
            } | Out-String)
          }
          $j = $describe | ConvertFrom-Json
          $dOnnx = ($j.packages | Where-Object { $_.name -eq 'd-onnxruntime' }).path
          $onnxDll = Join-Path $dOnnx 'build\onnxruntime\sdk\lib\onnxruntime.dll'
          if (-not (Test-Path $onnxDll)) {
            throw "onnxruntime.dll not found at $onnxDll - is d-onnxruntime built?"
          }
          Copy-Item $onnxDll -Destination onnxruntime.dll

          # Visual C++ runtime (app-local deployment): vibe3d.exe + onnxruntime.dll
          # statically import the dynamic MSVC CRT - MSVCP140.dll, MSVCP140_1.dll,
          # VCRUNTIME140*.dll, pulled in by the C++ deps (assimp / nfd) and onnx.
          # These ship only with the VC++ Redistributable, which a clean Windows
          # does NOT have - without them the exe fails to start with 0xc0000142
          # (DLL_INIT_FAILED) / "MSVCP140.dll was not found" (the "doesn't start"
          # symptom). Copy the WHOLE CRT redist folder next to the exe so the zip
          # is self-contained regardless of which CRT DLLs the deps pull in (the
          # 3-DLL hand-list missed MSVCP140_1.dll that onnxruntime needs). The
          # UCRT (api-ms-win-crt-* / ucrtbase.dll) is in-box on Windows 10+, so it
          # is not bundled. msvc-dev-cmd set VCToolsRedistDir.
          $crtDir = $null
          if ($env:VCToolsRedistDir) {
            $crtDir = Get-ChildItem (Join-Path $env:VCToolsRedistDir 'x64') -Directory -Filter 'Microsoft.VC*.CRT' -ErrorAction SilentlyContinue | Select-Object -First 1
          }
          if (-not $crtDir) {
            $crtDir = Get-ChildItem 'C:\Program Files*\Microsoft Visual Studio\*\*\VC\Redist\MSVC\*\x64\Microsoft.VC*.CRT' -Directory -ErrorAction SilentlyContinue | Select-Object -First 1
          }
          if (-not $crtDir) { throw "VC++ CRT redist folder not found (VCToolsRedistDir=$env:VCToolsRedistDir)" }
          $crtDlls = @(Get-ChildItem "$($crtDir.FullName)\*.dll")
          if ($crtDlls.Count -eq 0) { throw "no DLLs in CRT redist folder $($crtDir.FullName)" }
          $crtDlls | ForEach-Object { Copy-Item $_.FullName -Destination $_.Name -Force }
          Write-Host "[zip] bundled VC++ runtime: $(($crtDlls | ForEach-Object { $_.Name }) -join ', ')"

          # Stage into a folder before zipping so the opt-in AI worker keeps its
          # tools\ai3d_worker path (Compress-Archive flattens loose -Path items to
          # their leaf name, which would drop the "tools\" prefix the editor needs).
          $stage = 'win-stage'
          if (Test-Path $stage) { Remove-Item $stage -Recurse -Force }
          New-Item -ItemType Directory -Path $stage | Out-Null
          Copy-Item '${{ matrix.binary }}','SDL2.dll','onnxruntime.dll' "$stage\"
          $crtDlls | ForEach-Object { Copy-Item $_.FullName "$stage\" }
          Copy-Item -Recurse config "$stage\config"
          Copy-Item -Recurse assets "$stage\assets"

          # Opt-in AI image->3D (TRELLIS) provisioning, shipped next to the exe so
          # the editor's in-app "Install AI generation" resolves
          # tools\ai3d_worker\install_windows.ps1 (dirName(thisExePath())\tools\...).
          # install_windows.ps1 clones the fork + provisions the venv on first use.
          New-Item -ItemType Directory -Path "$stage\tools" | Out-Null
          Copy-Item -Recurse tools\ai3d_worker "$stage\tools\ai3d_worker"
          Get-ChildItem -Path "$stage\tools\ai3d_worker" -Recurse -Directory -Filter '__pycache__' -ErrorAction SilentlyContinue | Remove-Item -Recurse -Force -ErrorAction SilentlyContinue
          Write-Host "[zip] bundled opt-in AI worker (tools\ai3d_worker) for Windows TRELLIS"

          Compress-Archive -Path "$stage\*" -DestinationPath vibe3d-${{ matrix.name }}.zip -Force

      # ---- Upload artifacts for the release job ----

      - name: Upload zip (non-Linux)
        if: runner.os != 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: zip-${{ matrix.name }}
          path: vibe3d-${{ matrix.name }}.zip

      - name: Upload AppImage (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: appimage-linux
          path: Vibe3D-x86_64.AppImage

      # ---- Windows 7 variant -------------------------------------------------
      # A second Windows artifact built from the `modeling-noai` config: the AI
      # candidate ranker (d-onnxruntime) is dropped, so the exe no longer imports
      # onnxruntime.dll and therefore no longer pulls api-ms-win-core-path-l1-1-0
      # .dll (a Windows 8+ apiset that does not exist on Win7). The statusline
      # "AI" button renders as a disabled placeholder. The zip bundles BOTH the
      # VC++ runtime AND the UCRT app-local DLLs (ucrtbase.dll + api-ms-win-crt-*)
      # because Windows 7 has neither in-box (Win10+ ships the UCRT; on Win7 it
      # otherwise needs KB2999226).
      - name: Build + zip Win7 variant (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          dub build --config=modeling-noai --compiler=ldc2 --build=release --d-version=ReleaseBuild
          if ($LASTEXITCODE -ne 0) { throw "modeling-noai (Win7) build failed" }

          $stage = "win7-stage"
          if (Test-Path $stage) { Remove-Item $stage -Recurse -Force }
          New-Item -ItemType Directory -Path $stage | Out-Null
          Copy-Item '${{ matrix.binary }}' "$stage\"
          Copy-Item SDL2.dll "$stage\"
          Copy-Item -Recurse config "$stage\config"
          Copy-Item -Recurse assets "$stage\assets"

          # VC++ runtime (same rationale as the modeling zip above).
          $crtDir = $null
          if ($env:VCToolsRedistDir) {
            $crtDir = Get-ChildItem (Join-Path $env:VCToolsRedistDir 'x64') -Directory -Filter 'Microsoft.VC*.CRT' -ErrorAction SilentlyContinue | Select-Object -First 1
          }
          if (-not $crtDir) {
            $crtDir = Get-ChildItem 'C:\Program Files*\Microsoft Visual Studio\*\*\VC\Redist\MSVC\*\x64\Microsoft.VC*.CRT' -Directory -ErrorAction SilentlyContinue | Select-Object -First 1
          }
          if (-not $crtDir) { throw "VC++ CRT redist folder not found (VCToolsRedistDir=$env:VCToolsRedistDir)" }
          Copy-Item "$($crtDir.FullName)\*.dll" "$stage\"

          # UCRT app-local: Windows 7 has no in-box Universal CRT. Shipped with the
          # Windows 10 SDK under Redist\<ver>\ucrt\DLLs\x64 (ucrtbase.dll + the
          # api-ms-win-crt-* forwarders). Pick the newest SDK present.
          $ucrt = Get-ChildItem 'C:\Program Files (x86)\Windows Kits\10\Redist\*\ucrt\DLLs\x64' -Directory -ErrorAction SilentlyContinue | Sort-Object FullName -Descending | Select-Object -First 1
          if (-not $ucrt) { throw "UCRT app-local redist not found - install a Windows 10 SDK (Redist\*\ucrt\DLLs\x64)" }
          Copy-Item "$($ucrt.FullName)\*.dll" "$stage\"
          Write-Host "[win7] staged $((Get-ChildItem "$stage\*.dll").Count) DLLs (VC++ runtime + UCRT app-local)"

          Compress-Archive -Path "$stage\*" -DestinationPath vibe3d-windows-win7.zip -Force

      - name: Upload Win7 zip (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: zip-windows-win7
          path: vibe3d-windows-win7.zip

      # ---- Windows installer (Inno Setup) ------------------------------------
      # Wrap the self-contained modeling payload (the vibe3d-windows.zip built
      # above, which now also carries tools\ai3d_worker for the opt-in Windows
      # TRELLIS add-on) into vibe3d-setup-<tag>.exe. Inno Setup (iscc) is fetched
      # + silently installed on demand so the runner needs no pre-provisioning
      # (installing to Program Files assumes the self-hosted runner service is
      # elevated — as with the CRT/UCRT SDK steps above).
      - name: Install Inno Setup (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          $iscc = 'C:\Program Files (x86)\Inno Setup 6\ISCC.exe'
          if (Test-Path $iscc) { Write-Host "Inno Setup already present"; exit 0 }
          $url = 'https://github.com/jrsoftware/issrc/releases/download/is-6_7_3/innosetup-6.7.3.exe'
          curl.exe -L -o "$env:TEMP\innosetup.exe" $url
          if ($LASTEXITCODE -ne 0) { throw "Inno Setup download failed" }
          & "$env:TEMP\innosetup.exe" /VERYSILENT /SUPPRESSMSGBOXES /NORESTART /ALLUSERS | Out-Null
          if (-not (Test-Path $iscc)) { throw "Inno Setup install failed (iscc not at $iscc)" }
          Write-Host "Inno Setup 6.7.3 installed"

      - name: Build Windows installer (Inno Setup)
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          $ver = "${{ needs.check.outputs.tag }}" -replace '^v',''
          if (-not $ver) { $ver = "0.0.0-dev" }
          # Use the just-built self-contained modeling zip as the installer payload
          # (exe + DLLs + config + assets + tools\ai3d_worker).
          $payload = Join-Path $env:TEMP 'vibe3d-payload'
          if (Test-Path $payload) { Remove-Item $payload -Recurse -Force }
          Expand-Archive -Path vibe3d-${{ matrix.name }}.zip -DestinationPath $payload -Force
          .\tools\release\windows\build_windows_installer.ps1 -Version $ver -Payload $payload -OutputDir .\dist
          if ($LASTEXITCODE -ne 0) { throw "installer build failed" }

      - name: Upload Windows installer
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: installer-windows
          path: dist/vibe3d-setup-*.exe

  # Heavy with-render variant. Builds D-Cycles (Blender LFS submodule
  # ~5 GB + CMake compile of Cycles) + bundles the Cycles + RPR runtime
  # libs into a self-contained zip. Gated by the resolved with_render flag
  # (true for nightly, the dispatch input otherwise) to keep plain releases fast.
  build-render:
    needs: check
    if: ${{ needs.check.outputs.should_run == 'true' && needs.check.outputs.with_render == 'true' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: [self-hosted, Linux]
            name: linux
            bundle: tools/release/bundle_linux.sh
          - runner: [self-hosted, Windows]
            name: windows
            bundle: tools/release/bundle_windows.ps1

    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v4

      # Windows C: is small; put the dub package cache (heavy render git deps /
      # LFS) on F: where there's room. Must precede any dub command.
      - name: Put dub cache on F drive (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path F:\dub | Out-Null
          Add-Content -Path $env:GITHUB_ENV -Value "DUB_HOME=F:\dub"

      # Locate the host LDC (the bundle scripts build with --compiler=ldc2 by
      # default). Fails clearly if ldc2 isn't installed on the runner.
      - name: Locate LDC (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          if ! command -v ldc2 >/dev/null 2>&1; then
            for d in "$HOME"/dlang/ldc*/bin "$HOME"/.local/dlang/ldc*/bin \
                     /opt/ldc*/bin /usr/lib/ldc*/bin /usr/local/ldc*/bin; do
              if [ -x "$d/ldc2" ]; then echo "$d" >> "$GITHUB_PATH"; export PATH="$d:$PATH"; break; fi
            done
          fi
          command -v ldc2 >/dev/null 2>&1 || {
            echo "::error::ldc2 not found on this runner. Install LDC (e.g. ~/dlang/ldc-<ver>) so ldc2 is on PATH."
            exit 1; }
          ldc2 --version | head -1 || true

      - name: Locate LDC (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          if (-not (Get-Command ldc2 -ErrorAction SilentlyContinue)) {
            # Enumerate ldc* dirs under each base and check for bin\ldc2.exe —
            # more reliable than a wildcard-in-path + -Filter query.
            foreach ($base in @("$env:USERPROFILE\dlang", "C:\", "C:\Program Files", "C:\tools")) {
              if (-not (Test-Path $base)) { continue }
              $d = Get-ChildItem -Path $base -Directory -Filter "ldc*" -ErrorAction SilentlyContinue |
                   Where-Object { Test-Path (Join-Path $_.FullName "bin\ldc2.exe") } | Select-Object -First 1
              if ($d) {
                $bin = Join-Path $d.FullName "bin"
                Add-Content $env:GITHUB_PATH $bin
                $env:PATH = "$bin;$env:PATH"
                break
              }
            }
          }
          if (-not (Get-Command ldc2 -ErrorAction SilentlyContinue)) {
            Write-Output "::error::ldc2 not found on this runner. Install LDC so ldc2.exe is on PATH."
            exit 1
          }
          # Print the banner WITHOUT a pipe — `| Select-Object -First 1` stops
          # the pipeline early, kills ldc2.exe, and sets a non-zero exit code.
          ldc2 --version

      # Linux self-hosted runner has the with-render deps (SDL2/GTK3/ninja/cmake/
      # git-lfs/xz) pre-installed on the host.

      - name: Install SDL2 (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          $sdlVer = "2.30.3"
          # Reuse a cached C:\SDL2 across runs; only download+extract if absent.
          $sdlDir = Get-ChildItem C:\SDL2 -Directory -ErrorAction SilentlyContinue |
                    Where-Object { Test-Path "$($_.FullName)\lib\x64\SDL2.dll" } | Select-Object -First 1
          if (-not $sdlDir) {
            Invoke-WebRequest "https://github.com/libsdl-org/SDL/releases/download/release-$sdlVer/SDL2-devel-$sdlVer-VC.zip" -OutFile SDL2-devel.zip
            if (Test-Path C:\SDL2) { Remove-Item C:\SDL2 -Recurse -Force }
            Expand-Archive SDL2-devel.zip -DestinationPath C:\SDL2 -Force
            $sdlDir = Get-ChildItem C:\SDL2 -Directory |
                      Where-Object { Test-Path "$($_.FullName)\lib\x64\SDL2.dll" } | Select-Object -First 1
          } else {
            Write-Host "Reusing cached SDL2 at $($sdlDir.FullName)"
          }
          # Per-run: export SDL2_DIR, stage SDL2.dll for the zip, add libs to PATH.
          echo "SDL2_DIR=$($sdlDir.FullName)" >> $env:GITHUB_ENV
          Copy-Item "$($sdlDir.FullName)\lib\x64\SDL2.dll" -Destination .
          echo "$($sdlDir.FullName)\lib\x64" >> $env:GITHUB_PATH

      - name: Activate MSVC (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Add Git Bash to PATH (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          $gitBin = Join-Path $env:ProgramFiles "Git\bin"
          if (-not (Test-Path (Join-Path $gitBin "bash.exe"))) {
            Write-Output "::error::Git Bash not found at $gitBin"
            exit 1
          }
          Add-Content $env:GITHUB_PATH $gitBin
          $env:PATH = "$gitBin;$env:PATH"

      # Git dependencies are pinned to commit SHAs; keep the persistent dub cache
      # intact for heavyweight render deps.

      # `shell:` can't take a ${{ matrix.* }} expression (GitHub rejects the whole
      # workflow file), so the bundle step is split per-OS with a literal shell.
      - name: Bundle vibe3d-${{ matrix.name }}-render.zip (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: ${{ matrix.bundle }}

      - name: Bundle vibe3d-${{ matrix.name }}-render.zip (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: ${{ matrix.bundle }}

      - name: Upload zip
        uses: actions/upload-artifact@v4
        with:
          name: zip-${{ matrix.name }}-render
          path: vibe3d-${{ matrix.name }}-render.zip

  release:
    # `needs: build` always; `build-render` is conditional so the
    # release job uses `if: always()` to tolerate it being skipped.
    needs: [check, build, build-render]
    if: always() && needs.check.outputs.should_run == 'true' && needs.build.result == 'success'
    # Needs the `gh` CLI on the host to create the release.
    runs-on: [self-hosted, Linux]

    steps:
      - name: Download all zips
        uses: actions/download-artifact@v4
        with:
          pattern: zip-*
          merge-multiple: true

      - name: Download Linux AppImage
        uses: actions/download-artifact@v4
        with:
          pattern: appimage-*
          merge-multiple: true

      - name: Download Windows installer
        uses: actions/download-artifact@v4
        with:
          pattern: installer-*
          merge-multiple: true

      - name: List artifacts (debug)
        run: ls -lh *.zip *.AppImage *.exe 2>/dev/null || true

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          TAG:     ${{ needs.check.outputs.tag }}
          NIGHTLY: ${{ needs.check.outputs.nightly }}
        run: |
          # Linux ships as the broad-glibc (>=2.30) AppImage, replacing the old
          # vibe3d-linux.zip (which needed a system SDL2/GTK3).
          ASSETS=( Vibe3D-x86_64.AppImage vibe3d-macos-arm64.zip vibe3d-macos-x64.zip vibe3d-windows.zip )
          # Win7 (modeling-noai) variant — built alongside the Windows modeling zip.
          [[ -f vibe3d-windows-win7.zip   ]] && ASSETS+=( vibe3d-windows-win7.zip )
          # Windows installer (Inno Setup) — its filename carries the tag.
          for f in vibe3d-setup-*.exe; do [[ -f "$f" ]] && ASSETS+=( "$f" ); done
          # Append with-render assets only if their build job actually ran.
          [[ -f vibe3d-linux-render.zip   ]] && ASSETS+=( vibe3d-linux-render.zip )
          [[ -f vibe3d-windows-render.zip ]] && ASSETS+=( vibe3d-windows-render.zip )

          if [ "$NIGHTLY" = "true" ]; then
            # Rolling nightly: drop the previous release + its tag, then recreate
            # at the current commit so "nightly" always points at the latest build.
            gh release delete "$TAG" --yes --cleanup-tag || true
            gh release create "$TAG" \
              --title "vibe3d nightly ($(date -u +%Y-%m-%d))" \
              --notes "Automated nightly build from ${GITHUB_SHA:0:7} at $(date -u +%Y-%m-%dT%H:%MZ)." \
              --prerelease \
              "${ASSETS[@]}"
          else
            gh release create "$TAG" \
              --title "vibe3d $TAG" \
              --generate-notes \
              "${ASSETS[@]}"
          fi
