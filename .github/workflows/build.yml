name: Build

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.0.0)'
        required: true
        default: 'v0.0.1'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: linux
            binary: vibe3d
          - os: macos-lastest
            name: macos
            binary: vibe3d
          - os: windows-latest
            name: windows
            binary: vibe3d.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup DMD (Linux / Windows)
        if: runner.os != 'macOS'
        uses: dlang-community/setup-dlang@v1
        with:
          compiler: dmd-latest

      - name: Setup DMD (macOS via Homebrew)
        if: runner.os == 'macOS'
        run: |
          brew install dmd
          dmd --version
          dub --version

      # ---- SDL2 ----

      - name: Install SDL2 (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libsdl2-dev libgtk-3-dev ninja-build

      - name: Install SDL2 (macOS)
        if: runner.os == 'macOS'
        run: brew install sdl2

      - name: Install SDL2 (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $sdlVer = "2.30.3"
          $url = "https://github.com/libsdl-org/SDL/releases/download/release-$sdlVer/SDL2-devel-$sdlVer-VC.zip"
          Invoke-WebRequest $url -OutFile SDL2-devel.zip
          Expand-Archive SDL2-devel.zip -DestinationPath C:\SDL2
          $sdlDir = Get-ChildItem C:\SDL2 -Directory | Select-Object -First 1
          echo "SDL2_DIR=$($sdlDir.FullName)" >> $env:GITHUB_ENV
          Copy-Item "$($sdlDir.FullName)\lib\x64\SDL2.dll" -Destination .
          echo "$($sdlDir.FullName)\lib\x64" >> $env:GITHUB_PATH

      # ---- nfde submodule (Linux only) ----

      - name: First-pass build (fetches nfde and clones NFD repo, expected to fail)
        if: runner.os == 'Linux'
        run: dub build --compiler=dmd --build=release || true

      - name: Initialize nativefiledialog-extended submodules
        if: runner.os == 'Linux'
        run: |
          NFD_DIR="$HOME/.dub/packages/nfde/0.1.3/nfde/nativefiledialog-extended"
          if [ -d "$NFD_DIR" ]; then
            cd "$NFD_DIR"
            git submodule update --init --recursive
          fi

      # ---- Build ----

      - name: Build
        run: dub build --compiler=dmd --build=release

      # ---- Zip ----

      - name: Zip artifact (Linux / macOS)
        if: runner.os != 'Windows'
        run: zip vibe3d-${{ matrix.name }}.zip ${{ matrix.binary }}

      - name: Zip artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path ${{ matrix.binary }}, SDL2.dll -DestinationPath vibe3d-${{ matrix.name }}.zip

      # ---- Upload zip as artifact for the release job ----

      - name: Upload zip
        uses: actions/upload-artifact@v4
        with:
          name: zip-${{ matrix.name }}
          path: vibe3d-${{ matrix.name }}.zip

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all zips
        uses: actions/download-artifact@v4
        with:
          pattern: zip-*
          merge-multiple: true

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh release create "${{ inputs.tag }}" \
            --title "vibe3d ${{ inputs.tag }}" \
            --generate-notes \
            vibe3d-linux.zip \
            vibe3d-macos.zip \
            vibe3d-windows.zip
