tools:
  move:               W
  rotate:             E
  scale:              R
  xfrm.transform:     Y
  xfrm.elementMove:   T            # MODO: t
  mesh.mirrorTool:    "Shift+V"    # MODO: shift-v (*.mirror)
  mesh.loopSliceTool: "Alt+C"      # MODO: alt-c (poly.loopSlice)
  mesh.sliceTool:     "Shift+C"    # MODO: shift-c (poly.knife)
  edge.bevel:         B            # MODO: b (*.bevel)
  poly.bevel:         "Shift+B"    # MODO: shift-b
  poly.extrude:       "Shift+X"    # MODO: shift-x (*.extrude)
  edge.extend:        Z            # MODO: z
  prim.cube: ""

commands:
  select.expand:         "Shift+Up"
  select.contract:       "Shift+Down"
  select.more:           Up
  select.less:           Down
  select.loop:           L
  select.ring:           "Alt+L"
  select.invert:         "["
  select.connect:        "]"
  select.between:        "Shift+G"
  select.drop:           Escape
  viewport.fit:          A
  viewport.fit_selected: "Shift+A"
  mesh.subdivide:        "D ccsds"          # MODO: d (poly.subdivide ccsds) — applies immediately
  mesh.subdivide_faceted: "Shift+D"         # MODO: shift-d (faceted)
  mesh.triple:           "Shift+T"          # MODO: shift-t
  mesh.flip:             F                  # MODO: f (poly.flip)
  mesh.spinEdge:         V                  # MODO: v (edge.spinQuads)
  mesh.setMaterial:      M                  # MODO: m (poly.setMaterial)
  mesh.copy:             "Cmd+C"            # MODO: ctrl-c → Cmd on macOS
  mesh.paste:            "Cmd+V"            # MODO: ctrl-v → Cmd on macOS
  mesh.cut:              "Cmd+X"            # MODO: ctrl-x → Cmd on macOS
  tool.reset:            "Cmd+D"            # MODO: ctrl-d → Cmd on macOS
  history.undo:          "Cmd+Z"
  history.redo:          "Cmd+Shift+Z"
  mesh.delete:           Backspace
  mesh.remove:           "Cmd+Backspace"
  snap.toggle:           X
  file.new:              "Cmd+N"
  file.open:             "Cmd+O"
  file.save:             "Cmd+S"
  file.saveAs:           "Cmd+Shift+S"
  file.quit:             "Cmd+Q"

editmodes:
  vertices: "1"
  edges:    "2"
  polygons: "3"
