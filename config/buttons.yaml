panels:
  - title: Basic
    items:
      - title: File
        buttons:
          - { label: New,        action: { kind: command, id: file.new  } }
          - { label: "Open…",    action: { kind: command, id: file.open } }
          - { label: Save,       action: { kind: command, id: file.save } }
          - { label: "Save As…", action: { kind: command, id: file.saveAs } }
          - label: "Import ›"
            action:
              kind: popup
              items:
                - { label: "LWO…",   action: { kind: command, id: "file.import.lwo"  } }
                - { label: "OBJ…",   action: { kind: command, id: "file.import.obj"  } }
                - { label: "glTF…",  action: { kind: command, id: "file.import.gltf" } }
                - { label: "FBX…",   action: { kind: command, id: "file.import.fbx"  } }
          - label: "Export ›"
            action:
              kind: popup
              items:
                - { label: "LWO…",   action: { kind: command, id: "file.export.lwo"  } }
                - { label: "OBJ…",   action: { kind: command, id: "file.export.obj"  } }
                - { label: "glTF…",  action: { kind: command, id: "file.export.gltf" } }
                - { label: "FBX…",   action: { kind: command, id: "file.export.fbx"  } }
          - { label: Quit, action: { kind: command, id: file.quit } }
      - title: History
        buttons:
          - { label: Redo,    action: { kind: command, id: history.redo } }
          - { label: Undo,    action: { kind: command, id: history.undo } }
          - { label: History, action: { kind: command, id: history.show } }
      - title: Transform
        buttons:
          - { label: Move,      action: { kind: tool, id: move } }
          - { label: Rotate,    action: { kind: tool, id: rotate } }
          - { label: Scale,     action: { kind: tool, id: scale } }
          - { label: Transform, action: { kind: tool, id: xfrm.transform } }
      - title: Create
        buttons:
          - label: Box
            action: { kind: tool, id: prim.cube }
            ctrl:
              label: "Unit Box"
              action:
                kind: script
                lines:
                  - "prim.cube cenX:0 cenY:0 cenZ:0 sizeX:1 sizeY:1 sizeZ:1 segmentsX:1 segmentsY:1 segmentsZ:1 radius:0"
          - label: Sphere
            action: { kind: tool, id: prim.sphere }
            ctrl:
              label: "Unit Sphere"
              action:
                kind: script
                lines:
                  - "prim.sphere method:globe cenX:0 cenY:0 cenZ:0 sizeX:0.5 sizeY:0.5 sizeZ:0.5 sides:24 segments:24 axis:1"
          - label: Ellipsoid
            action: { kind: tool, id: prim.ellipsoid }
            ctrl:
              label: "Unit Ellipsoid"
              action:
                kind: script
                lines:
                  - "prim.ellipsoid cenX:0 cenY:0 cenZ:0 sizeX:0.5 sizeY:1.0 sizeZ:0.5 sides:24 segments:24 axis:1"
          - label: Cylinder
            action: { kind: tool, id: prim.cylinder }
            ctrl:
              label: "Unit Cylinder"
              action:
                kind: script
                lines:
                  - "prim.cylinder cenX:0 cenY:0 cenZ:0 sizeX:0.5 sizeY:0.5 sizeZ:0.5 sides:24 segments:1 axis:1"
          - label: Tube
            action: { kind: tool, id: prim.tube }
            ctrl:
              label: "Unit Tube"
              action:
                kind: script
                lines:
                  - "prim.tube cenX:0 cenY:0 cenZ:0 outerRadius:0.5 innerRadius:0.25 height:1 segments:24 axis:1 cap:true"
          - label: Cone
            action: { kind: tool, id: prim.cone }
            ctrl:
              label: "Unit Cone"
              action:
                kind: script
                lines:
                  - "prim.cone cenX:0 cenY:0 cenZ:0 sizeX:0.5 sizeY:0.5 sizeZ:0.5 sides:24 segments:1 axis:1"
          - label: Capsule
            action: { kind: tool, id: prim.capsule }
            ctrl:
              label: "Unit Capsule"
              action:
                kind: script
                lines:
                  - "prim.capsule cenX:0 cenY:0 cenZ:0 sizeX:0.25 sizeY:0.5 sizeZ:0.25 sides:24 segments:1 endsegments:6 endsize:1.0 axis:1"
          - label: Torus
            action: { kind: tool, id: prim.torus }
            ctrl:
              label: "Unit Torus"
              action:
                kind: script
                lines:
                  - "prim.torus cenX:0 cenY:0 cenZ:0 majorRadius:0.5 minorRadius:0.125 majorSegments:24 minorSegments:12 axis:1"
          - label: Arc
            action: { kind: tool, id: prim.arc }
            ctrl:
              label: "Unit Arc"
              action:
                kind: script
                lines:
                  - "prim.arc cenX:0 cenY:0 cenZ:0 radius:0.5 startAngle:0 endAngle:180 segments:24 axis:1"
          - label: Pen
            action: { kind: tool, id: pen }
          - label: Vertex
            action: { kind: tool, id: prim.vertex }
  # Deform palette
  - title: Deform
    items:
      - title: Move
        buttons:
          - { label: "Element Move",
              action: { kind: tool, id: xfrm.elementMove } }
          - { label: "Flex",
              action: { kind: tool, id: xfrm.flex } }
          - { label: "Soft Drag",
              action: { kind: tool, id: xfrm.softDrag } }
          - { label: "Soft Move",
              action: { kind: tool, id: xfrm.softMove } }
          - { label: "Soft Transform",
              action: { kind: tool, id: xfrm.softTransform } }
          - { label: "Shear",
              action: { kind: tool, id: xfrm.shear } }
          - { label: "Smooth",
              action: { kind: tool, id: xfrm.smooth } }
          - { label: "Jitter",
              action: { kind: tool, id: xfrm.jitter } }
          - { label: "Quantize",
              action: { kind: tool, id: xfrm.quantize } }
      - title: Rotate
        buttons:
          - { label: "Soft Rotate",
              action: { kind: tool, id: xfrm.softRotate } }
          - { label: "Twist",
              action: { kind: tool, id: xfrm.twist } }
          - { label: "Bend",
              action: { kind: tool, id: xfrm.bend } }
          - { label: "Vortex",
              action: { kind: tool, id: xfrm.vortex } }
          - { label: "Swirl",
              action: { kind: tool, id: xfrm.swirl } }
      - title: Scale
        buttons:
          - { label: "Soft Scale",
              action: { kind: tool, id: xfrm.softScale } }
          - { label: "Uniform Scale",
              action: { kind: tool, id: xfrm.scaleUniform } }
          - { label: "Push",
              action: { kind: tool, id: xfrm.push } }
          - { label: "Sculpt", disable: true,
              action: { kind: tool, id: xfrm.sculpt } }
          - { label: "Taper",
              action: { kind: tool, id: xfrm.taper } }
          - { label: "Bulge",
              action: { kind: tool, id: xfrm.bulge } }
          - { label: "Flare",
              action: { kind: tool, id: xfrm.flare } }
      - title: Align
        buttons:
          - { label: "Radial Align",
              action: { kind: command, id: mesh.radial_align } }
          - { label: "Linear Align",
              action: { kind: command, id: mesh.linear_align } }
  # Duplicate palette
  - title: Duplicate
    items:
      - title: Commands
        buttons:
          - { label: Duplicate,
              action: { kind: command, id: mesh.duplicate } }
          - { label: Mirror,
              action: { kind: command, id: mesh.mirror } }
          - { label: "Mirror Tool",
              action: { kind: tool, id: mesh.mirrorTool } }
          - { label: Array,
              action: { kind: tool, id: mesh.arrayTool } }
          - { label: "Radial Array",
              action: { kind: command, id: mesh.radial_array } }
          - { label: "Radial Array Tool",
              action: { kind: tool, id: mesh.radialArrayTool } }
          - { label: "Radial Sweep",
              action: { kind: command, id: mesh.sweep } }
          - { label: "Radial Sweep Tool",
              action: { kind: tool, id: mesh.radialSweepTool } }
          - { label: "Duplicate Layer",
              action: { kind: command, id: layer.duplicate } }
  - title: Mesh Edit
    items:
      - title: Slice
        buttons:
          - { label: "Loop Slice",   action: { kind: tool, id: mesh.loopSliceTool } }
          - { label: "Slice",        action: { kind: tool, id: mesh.sliceTool } }
          - { label: Julienne,       action: { kind: command, id: mesh.julienne } }
          - { label: "Axis Slice",   action: { kind: command, id: mesh.axisSlice } }
          - { label: "Screen Slice", action: { kind: command, id: mesh.screenSlice } }
          - { label: "Edge Slice",   action: { kind: tool, id: mesh.edgeSliceTool } }
      - title: Commands
        buttons:
          - { label: Subdivide,  action: { kind: command, id: mesh.subdivide } }
          - { label: Faceted,    action: { kind: command, id: mesh.subdivide_faceted } }
          - { label: Subpatch,   action: { kind: command, id: mesh.subpatch_toggle } }
          - { label: "Clean Up", action: { kind: command, id: mesh.cleanup } }
      - title: Clipboard
        buttons:
          - { label: Cut,   action: { kind: command, id: mesh.cut } }
          - { label: Copy,  action: { kind: command, id: mesh.copy } }
          - { label: Paste, action: { kind: command, id: mesh.paste } }
  - title: Vertex
    items:
      - title: Tools
        buttons:
          - { label: Bevel,   action: { kind: command, id: mesh.vertexBevel } }
          - { label: Extrude, action: { kind: command, id: mesh.vertexExtrude } }
      - title: Commands
        buttons:
          - { label: Join,         action: { kind: command, id: vert.join } }
          - { label: Merge,        action: { kind: command, id: vert.merge } }
          - { label: "Add Vertex", action: { kind: command, id: mesh.addVertex } }
          - { label: Center,       action: { kind: command, id: mesh.centerVertices } }
          - { label: Collapse,     action: { kind: command, id: mesh.collapse } }
          - { label: Split,        action: { kind: command, id: mesh.vertexSplit } }
  - title: Edge
    items:
      - title: Tools
        buttons:
          - { label: Bevel,      action: { kind: tool,    id: edge.bevel } }
          - { label: Slide,      action: { kind: tool,    id: edge.slide } }
          - { label: "Add Loop", action: { kind: command, id: mesh.addLoop } }
          - { label: "Add Point", action: { kind: command, id: mesh.addPoint } }
      - title: Commands
        buttons:
          - { label: Extrude, action: { kind: tool,    id: edge.extrude } }
          - { label: Extend,  action: { kind: tool,    id: edge.extend } }
          - { label: Bridge,  action: { kind: command, id: mesh.bridge } }
          - { label: Spin,    action: { kind: command, id: mesh.spinEdge } }
          - { label: Join,    action: { kind: command, id: mesh.edgeJoin } }
          - { label: Split,   action: { kind: command, id: mesh.split_edge } }
  - title: Polygon
    items:
      - title: Tools
        buttons:
          - { label: Bevel,          action: { kind: command, id: mesh.bevel } }
          - { label: "Smooth Shift", action: { kind: command, id: mesh.smooth_shift } }
          - { label: Thicken,        action: { kind: command, id: mesh.thicken } }
          - { label: Spikey,         action: { kind: command, id: mesh.spikey } }
          - { label: Inset,          action: { kind: tool,    id: mesh.polyInsetTool } }
          - { label: Reduce,         action: { kind: command, id: mesh.reduce } }
      - title: Commands
        buttons:
          - { label: Bridge,         action: { kind: command, id: mesh.bridge } }
          - { label: "Make Polygon", action: { kind: command, id: mesh.makePolygon } }
          - { label: Split,          action: { kind: command, id: mesh.splitFace } }
          - { label: Triple,         action: { kind: command, id: mesh.triple } }
          - { label: Quadruple,      action: { kind: command, id: mesh.quadruple } }
          - { label: Flip,           action: { kind: command, id: mesh.flip } }
          - { label: "Set Part",     action: { kind: command, id: mesh.setPart } }
          - { label: "Set Material", action: { kind: command, id: mesh.setMaterial } }
      - title: Reduce
        buttons:
          - { label: Merge,          action: { kind: command, id: mesh.mergeFaces } }
          - { label: Unify,          action: { kind: command, id: poly.unify } }
          - { label: Detriangulate,  action: { kind: command, id: mesh.detriangulate } }
  - title: Selection
    items:
      - title: Grow / Shrink
        buttons:
          - { label: Expand,   action: { kind: command, id: select.expand } }
          - { label: Contract, action: { kind: command, id: select.contract } }
          - { label: More,     action: { kind: command, id: select.more } }
          - { label: Less,     action: { kind: command, id: select.less } }
      - title: Topology
        buttons:
          - { label: Loop,    action: { kind: command, id: select.loop } }
          - { label: Ring,    action: { kind: command, id: select.ring } }
          - { label: Connect, action: { kind: command, id: select.connect } }
          - { label: Between, action: { kind: command, id: select.between } }
          - { label: Invert, action: { kind: command, id: select.invert } }
  - title: UV
    items:
      - title: Create
        buttons:
          - { label: Project, action: { kind: command, id: uv.project } }
          - { label: Relax,   action: { kind: command, id: uv.relax } }
          - { label: Fit,     action: { kind: command, id: uv.fit } }
      - title: Modify
        buttons:
          - { label: Flip,   action: { kind: command, id: uv.flip } }
          - { label: Rotate, action: { kind: command, id: uv.rotate } }
          - { label: Mirror, action: { kind: command, id: uv.mirror } }
          - { label: Pack,   action: { kind: command, id: uv.pack } }
      - title: Maps
        buttons:
          - { label: Delete, action: { kind: command, id: uv.delete } }
          - { label: Rename, action: { kind: command, id: uv.rename } }
          - { label: Copy,   action: { kind: command, id: uv.copy } }
          - { label: Clear,  action: { kind: command, id: uv.clear } }
  - title: Viewport
    items:
      - { label: Fit,          action: { kind: command, id: viewport.fit } }
      - { label: Fit Selected, action: { kind: command, id: viewport.fit_selected } }
