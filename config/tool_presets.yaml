# Tool presets — declarative "compound" tools built by wrapping a base
# tool and configuring one or more toolpipe stages on activate. Mirrors
# MODO's stock tool-preset definitions (e.g. `xfrm.shear`, `xfrm.twist`,
# `xfrm.softDrag`):
# each preset names a base tool + per-pipe-stage attributes.
#
# When activated via `tool.set <preset-id>`:
#   1. The base tool's factory runs (Move / Rotate / Scale / ...).
#   2. For each `pipe.<stageId>` block, `setAttr(key, value)` is called
#      on the matching toolpipe stage. Values stringify the same way
#      `tool.pipe.attr <stageId> <name> <value>` does — bool as
#      "true"/"false", floats / vec3s as raw, etc.
#
# Adding a new preset = editing this file. No code change required
# unless the preset needs behaviour the existing stages can't express.
presets:
  # ----- Deform sub-tab (D.1 of doc/deform_plan.md) ---------------
  - id: xfrm.softDrag
    base: move
    # MODO's softDrag is a brush-style tool: each LMB drag is one
    # atomic action that commits to history; the next click starts a
    # fresh weighted pull from the new grab point instead of piling
    # onto the previous baseline. Matches MODO's brush-reset tool
    # behaviour.
    flags: [brushReset]
    pipe:
      falloff:
        type: screen
        # MODO ships xfrm.softDrag (and the bare
        # falloff.screen preset) with `trans integer 0` — camera-
        # facing only. Verts behind the camera don't participate in
        # the drag; flip to "true" only for through-the-mesh deform.
        transparent: "false"

  - id: xfrm.softMove
    base: move
    pipe:
      falloff:
        type: radial

  - id: xfrm.softRotate
    base: rotate
    # Scale the rotation ANGLE by the falloff weight (radius-preserving),
    # R(w*theta), instead of matrix-lerping toward identity. Reference-verified
    # for single-axis soft rotation. The other base:rotate soft-rotation presets
    # (xfrm.swirl / xfrm.twist / xfrm.vortex) set this too — they are all
    # angle-scaling soft rotations, each reference-verified against the
    # appropriate falloff (radial / linear / cylinder).
    attrs:
      rotFalloffBlend: arc
    pipe:
      falloff:
        type: radial

  - id: xfrm.softScale
    base: scale
    pipe:
      falloff:
        type: radial

  # MODO ships xfrm.twist / xfrm.shear / xfrm.taper with `shape integer 0`
  # (Linear) — the falloff stage's default Smooth
  # shape would override this if not pinned here, leaving deform tools
  # with the wrong attenuation curve compared to MODO.
  - id: xfrm.twist
    base: rotate
    # Angle-scaling soft rotation (R(w*theta), radius-preserving — see
    # xfrm.softRotate) under a LINEAR falloff. Reference-verified.
    attrs:
      rotFalloffBlend: arc
    pipe:
      falloff:
        type: linear
        shape: linear

  - id: xfrm.swirl
    base: rotate
    # Angle-scaling soft rotation (see xfrm.softRotate) under a radial falloff.
    attrs:
      rotFalloffBlend: arc
    pipe:
      falloff:
        type: radial

  - id: xfrm.shear
    base: move
    pipe:
      falloff:
        type: linear
        shape: linear

  - id: xfrm.taper
    base: scale
    pipe:
      falloff:
        type: linear
        shape: linear

  - id: xfrm.bulge
    base: scale
    pipe:
      falloff:
        type: radial

  # `xfrm.flare` mirrors MODO's stock `Flare` preset —
  # surprisingly, just push-along-normals + linear falloff (NOT the
  # outward-scale-perpendicular-to-axis behaviour the name might
  # suggest). Same wiring lets us match MODO bit-for-bit.
  - id: xfrm.flare
    base: xfrm.push
    pipe:
      falloff:
        type:  linear
        shape: linear

  # `xfrm.vortex` mirrors the reference engine's stock `vortex` preset:
  # cylinder falloff (radial-perpendicular-to-axis) + Rotate. The user
  # rotates by setting an axis attr (e.g. RZ) about the matching cylinder
  # axis; per-vert weight comes from the cylinder falloff so verts on the
  # axis spin full, verts at the cylinder's radial boundary stay put.
  # Like the other soft-rotation presets it scales the rotation ANGLE by
  # the weight (R(w*theta), radius-preserving) — reference-verified.
  - id: xfrm.vortex
    base: rotate
    attrs:
      rotFalloffBlend: arc
    pipe:
      falloff:
        type:  cylinder
        shape: linear

  # ----- Transform sub-tab ----------------------------------------
  # `xfrm.elementMove` mirrors MODO's `tool.set ElementMove` —
  # MODO's preset only sets the ACEN slot (center.element), the WGHT
  # slot (falloff.element with mode=automatic) and the ACTR slot
  # (xfrm.transform). It does NOT touch the AXIS slot, so AXIS stays
  # at its default (axis.auto = workplane / world axes). We match
  # that — pinning AXIS=element would point the transform gizmo at
  # per-cluster axes (which the element-move flow doesn't want).
  # Also published as `move.element` (backwards-compat alias without
  # the falloff stage activation).
  - id: xfrm.elementMove
    base: xfrm.transform
    # MODO's stock ElementMove: T=1, R=0, S=0 (translate-only).
    # User flips R/S via the property panel for the unified Transform.
    attrs:
      T: "true"
      R: "false"
      S: "false"
    pipe:
      actionCenter:
        mode: element
      falloff:
        type:  element
        shape: linear
        # Mirror MODO's stock `mode integer 0` default —
        # explicit `auto` so re-activating the preset resets the
        # 7-mode pick selector to its default (without this, mode
        # is whatever the previous activation left behind).
        mode:  auto

  # MODO-name alias for the same preset (stock `ElementMove`).
  # Useful for cross-engine diff cases that share a
  # case JSON between MODO and vibe3d.
  - id: ElementMove
    base: xfrm.transform
    attrs:
      T: "true"
      R: "false"
      S: "false"
    pipe:
      actionCenter:
        mode: element
      falloff:
        type:  element
        shape: linear
        mode:  auto

  - id: move.element
    base: move
    pipe:
      actionCenter:
        mode: element
      axis:
        mode: element

  # `xfrm.flex` mirrors MODO's stock `Flex` preset:
  # ACEN=border, AXIS=select,
  # Falloff=selection (with shape=smooth), Transform with T/R/S
  # all on. The `falloff.selection` `steps` attr is an integer
  # BFS-hop count (its own `steps` field/param, labelled "Steps").
  # D.7 of doc/deform_d7_flex_plan.md.
  - id: xfrm.flex
    base: xfrm.transform
    attrs:
      T: "true"
      R: "true"
      S: "true"
    pipe:
      actionCenter:
        mode: border
      axis:
        mode: select
      falloff:
        type:  selection
        shape: smooth

  # ----- xfrm.transform per-mode presets --------------------------
  # Mirror MODO's stock TransformMove / TransformRotate / TransformScale
  # presets — one tool (xfrm.transform) with different T/R/S flag combos
  # and H selecting the handle family. `presentation` is vibe3d's explicit
  # split between MODO's per-mode full handles and bare Transform's compact
  # combined handles.
  - id: TransformMove
    base: xfrm.transform
    attrs:
      T: "true"
      R: "false"
      S: "false"
      H: "0"
      presentation: "full"

  - id: TransformRotate
    base: xfrm.transform
    attrs:
      T: "false"
      R: "true"
      S: "false"
      H: "1"
      presentation: "full"

  - id: TransformScale
    base: xfrm.transform
    attrs:
      T: "false"
      R: "false"
      S: "true"
      H: "2"
      presentation: "full"

  # Bare Transform: all three handler banks visible (MODO's
  # `Transform` preset with T=R=S=1). Documented limitation: each
  # sub-tool maintains its own edit session, so single-drag undo
  # records one entry per sub-tool. Most users want one of the per-
  # mode presets above instead.
  - id: Transform
    base: xfrm.transform
    attrs:
      T: "true"
      R: "true"
      S: "true"
      H: "0"
      presentation: "compact"
