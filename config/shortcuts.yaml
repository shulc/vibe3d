tools:
  move:               W
  rotate:             E
  scale:              R
  xfrm.transform:     Y
  xfrm.elementMove:   T            # ref: t
  mesh.mirrorTool:    "Shift+V"    # ref: shift-v (*.mirror)
  mesh.loopSliceTool: "Alt+C"      # ref: alt-c (poly.loopSlice)
  mesh.sliceTool:     "Shift+C"    # ref: shift-c (poly.knife)
  edge.bevel:         B            # ref: b (*.bevel)
  poly.bevel:         "Shift+B"    # ref: shift-b
  poly.extrude:       "Shift+X"    # ref: shift-x (*.extrude)
  edge.extend:        Z            # ref: z
  prim.cube: ""

commands:
  select.expand:         "Shift+Up"
  select.contract:       "Shift+Down"
  select.more:           Up
  select.less:           Down
  select.loop:           L
  select.ring:           "Alt+L"
  select.invert:         "["
  select.connect:        "]"
  select.between:        "Shift+G"
  select.drop:           Escape
  viewport.fit:          A
  viewport.fit_selected: "Shift+A"
  mesh.subdivide:        "D ccsds"          # ref: d (poly.subdivide ccsds) — applies immediately
  mesh.subdivide_faceted: "Shift+D"         # ref: shift-d (faceted)
  mesh.triple:           "Shift+T"          # ref: shift-t
  mesh.flip:             F                  # ref: f (poly.flip)
  mesh.spinEdge:         V                  # ref: v (edge.spinQuads)
  mesh.setMaterial:      M                  # ref: m (poly.setMaterial)
  mesh.copy:             "Ctrl+C"           # ref: ctrl-c
  mesh.paste:            "Ctrl+V"           # ref: ctrl-v
  mesh.cut:              "Ctrl+X"           # ref: ctrl-x
  tool.reset:            "Ctrl+D"           # ref: ctrl-d
  history.undo:          "Ctrl+Z"
  history.redo:          "Ctrl+Shift+Z"
  mesh.delete:           Delete
  mesh.remove:           Backspace
  snap.toggle:           X
  file.new:              "Ctrl+N"
  file.open:             "Ctrl+O"
  file.save:             "Ctrl+S"
  file.saveAs:           "Ctrl+Shift+S"
  file.quit:             "Ctrl+Q"

editmodes:
  vertices: "1"
  edges:    "2"
  polygons: "3"
